name: registro_panela_web
description: "Registro Panela web app."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  core:
    path: ../../packages/core
  cloud_firestore: ^6.2.0
  firebase_core: ^4.6.0
  flutter_riverpod: ^3.1.0
  go_router: ^17.2.0
  intl: ^0.20.2

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
  fonts:
    - family: RobotoVariableItalic
      fonts:
        - asset: assets/fonts/Roboto-Italic-VariableFont_wdth,wght.ttf
          weight: 400
          style: normal