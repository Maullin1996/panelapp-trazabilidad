name: mobile
description: "Registro Panela mobile app."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  flutter:
    sdk: flutter
  core:
    path: ../../packages/core

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.3.10
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true

flutter_native_splash:
  color: "#F5EFE1"
  image: assets/images/logo_splash.png
  android: true
  ios: true
  android_12:
    image: assets/images/logo_splash.png
    color: "#F5EFE1"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo_icono.png
  remove_alpha_ios: true
  adaptive_icon_background: "#F5EFE1"
  adaptive_icon_foreground: assets/images/logo_icono.png
  adaptive_icon_foreground_inset: 16