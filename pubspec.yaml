name: registro_panela
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0

environment:
  sdk: ^3.8.1

dependencies:
  cached_network_image: ^3.4.1
  camera: ^0.12.0+1
  cloud_firestore: ^6.2.0
  cloud_functions: ^6.1.0
  collection: ^1.19.1
  equatable: ^2.0.7
  firebase_auth: ^6.3.0
  firebase_core: ^4.6.0
  firebase_storage: ^13.2.0
  flutter:
    sdk: flutter
  flutter_form_builder: ^10.1.0
  flutter_image_compress: ^2.4.0
  flutter_riverpod: ^3.1.0
  form_builder_validators: ^11.2.0
  freezed_annotation: ^3.1.0
  go_router: ^17.2.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  json_annotation: ^4.9.0
  path: ^1.9.1
  path_provider: ^2.1.5
  pdf: ^3.10.4
  printing: ^5.11.0
  riverpod_annotation: ^4.0.0
  share_plus: ^12.0.2
  uuid: ^4.5.1

dev_dependencies:
  build_runner: ^2.5.4
  custom_lint: ^0.8.1
  flutter_image_compress_platform_interface: ^1.0.5
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.3.10
  flutter_test:
    sdk: flutter
  freezed: ^3.1.0
  integration_test:
    sdk: flutter
  json_serializable: ^6.9.5
  riverpod_generator: ^4.0.0+1
  riverpod_lint: ^3.1.0

flutter:
  uses-material-design: true

  assets: 
    - assets/images/logo.png

  fonts:
    - family: RobotoVariableItalic
      fonts:
        - asset: assets/fonts/Roboto-Italic-VariableFont_wdth,wght.ttf
          weight: 400
          style: normal

flutter_native_splash:
  color: "#F5EFE1"
  image: assets/images/logo_splash.png
  android: true
  ios: true
  android_12:
    image: assets/images/logo_splash.png
    color: "#F5EFE1"

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo_icono.png
  remove_alpha_ios: true
  adaptive_icon_background: "#F5EFE1"
  adaptive_icon_foreground: assets/images/logo_icono.png
  adaptive_icon_foreground_inset: 16

